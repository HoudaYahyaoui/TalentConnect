<div class="auth-page">
  <section class="auth-panel">
    <mat-card>
      <div class="auth-top">
        <h2>Mot de passe oublié</h2>
        <p>Entrez votre adresse email pour recevoir les instructions de réinitialisation.</p>
      </div>

      <ng-container *ngIf="step() === 1; else confirmationBlock">
        <form [formGroup]="emailForm" (ngSubmit)="requestReset()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email professionnel</mat-label>
            <input matInput formControlName="email" placeholder="votre.email@entreprise.com" />
            <mat-error *ngIf="emailForm.controls.email.invalid && emailForm.controls.email.touched"
              >Email invalide</mat-error
            >
          </mat-form-field>

          <p *ngIf="errorMsg()" class="error-text" role="alert">{{ errorMsg() }}</p>

          <button mat-flat-button color="primary" class="full-width" type="submit" [disabled]="loading()">
            {{ loading() ? 'Envoi en cours…' : 'Envoyer la réinitialisation' }}
          </button>
        </form>
      </ng-container>
      <ng-template #confirmationBlock>
        <div class="confirmation-card">
          <mat-icon color="primary">check_circle</mat-icon>
          <p>Un email de réinitialisation a été envoyé si votre compte existe.</p>
          <button mat-button color="primary" (click)="backToLogin()">Retour à la connexion</button>
        </div>
      </ng-template>
    </mat-card>
  </section>
</div>
