<div class="chatbot-widget">
  <button
    mat-fab
    color="primary"
    class="chat-toggle"
    type="button"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen()"
  >
    <mat-icon>{{ isOpen() ? 'close' : 'smart_toy' }}</mat-icon>
  </button>

  <section class="chat-panel" *ngIf="isOpen()">
    <header class="chat-header">
      <div class="chat-header-copy">
        <span class="eyebrow">Assistant centralisé</span>
        <strong>TalentConnect AI</strong>
        <p>Offres, candidatures, profil et cooptation en temps réel</p>
      </div>
      <button mat-icon-button type="button" (click)="toggle()" aria-label="Fermer le chatbot">
        <mat-icon>close</mat-icon>
      </button>
    </header>

    <div class="chat-messages" aria-live="polite">
      @if (sending()) {
        <div class="typing-row">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      }
      <article
        *ngFor="let message of messages()"
        class="message"
        [class.user]="message.role === 'user'"
      >
        <p>{{ message.text }}</p>
        <small *ngIf="message.sources && message.sources.length"
          >Sources : {{ message.sources.join(' • ') }}</small
        >
      </article>
    </div>

    <mat-chip-set class="chat-suggestions">
      <button
        mat-chip
        *ngFor="let suggestion of suggestions()"
        type="button"
        (click)="sendMessage(suggestion)"
      >
        {{ suggestion }}
      </button>
    </mat-chip-set>

    <footer class="chat-footer">
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Poser une question</mat-label>
        <input
          matInput
          [ngModel]="question()"
          (ngModelChange)="question.set($event)"
          (keyup.enter)="sendMessage()"
        />
      </mat-form-field>
      <button mat-flat-button color="primary" type="button" (click)="sendMessage()">Envoyer</button>
    </footer>
  </section>
</div>
